<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentRelay 文档</title>
    <link rel="stylesheet" href="/docs.css" />
    <link
      rel="stylesheet"
      media="(prefers-color-scheme: light)"
      href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github.min.css"
    />
    <link
      rel="stylesheet"
      media="(prefers-color-scheme: dark)"
      href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github-dark.min.css"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo-dot"></span>
        <span class="logo-text">AgentRelay Docs</span>
      </div>
      <div class="topbar-right">
        <input id="search" class="search" type="search" placeholder="搜索文档…" />
        <a class="topbar-link" href="/">← 返回测试台</a>
      </div>
    </header>

    <div class="layout">
      <aside class="doc-nav">
        <div class="nav-heading">说明文档</div>
        <ul id="doc-list" class="doc-list"></ul>
      </aside>

      <main class="doc-main">
        <article id="doc-content" class="markdown-body">
          <p class="loading">加载中…</p>
        </article>
      </main>

      <aside class="doc-toc">
        <div class="toc-heading">本页目录</div>
        <ul id="toc-list" class="toc-list"></ul>
      </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
    <script src="/docs.js"></script>
  </body>
</html>
