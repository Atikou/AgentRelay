<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentRelay</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- 侧边栏：把项目里“有什么功能”做成按钮 -->
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-dot"></span>
          <span class="brand-name">AgentRelay</span>
        </div>

        <button class="primary-btn" data-action="new-chat">＋ 新会话</button>
        <a class="primary-btn doc-entry" href="/docs">说明文档 ↗</a>
        <a class="primary-btn doc-entry" href="/api-docs">API 文档 ↗</a>

        <nav class="nav-group">
          <div class="nav-title">已实现 · 模型接入与路由</div>
          <button class="nav-btn" data-action="view-config">查看配置</button>
          <button class="nav-btn" data-action="check-models">检测模型可用性</button>
          <button class="nav-btn" data-action="refresh-models">刷新模型列表</button>
          <button class="nav-btn" data-action="metrics">调用统计</button>
          <button class="nav-btn" data-action="routing-logs">模型路由日志</button>
          <button class="nav-btn" data-action="run-reports">运行报告</button>
          <button class="nav-btn" data-action="security">审计回放</button>
          <button class="nav-btn" data-action="storage">本地存储</button>
        </nav>

        <nav class="nav-group">
          <div class="nav-title">已实现 · 测试</div>
          <a class="nav-btn nav-link" href="/test-cases.html">测试用例</a>
        </nav>

        <section class="sidebar-history">
          <div class="nav-title">历史会话</div>
          <div id="sidebar-history-list" class="sidebar-history-list">
            <div class="sidebar-history-empty">读取中…</div>
          </div>
        </section>

        <span id="profile-tag" hidden>profile: -</span>
      </aside>

      <!-- 主区：对话 / 输出 -->
      <main class="main">
        <header class="main-head">
          <div class="status">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">未连接</span>
          </div>
        </header>

        <section id="feed" class="feed">
          <div class="welcome">
            <div class="welcome-kicker">AgentRelay</div>
            <h1>Agent 编排控制台</h1>
            <p>统一自动工作流入口：描述目标后系统自动识别意图、路由工作流，并由权限策略控制写文件与命令边界。</p>
            <div class="welcome-actions">
              <button class="action-btn" data-action="check-models">检测模型</button>
              <a class="action-btn secondary" href="/test-cases.html">测试用例</a>
              <button class="action-btn secondary" data-action="view-config">查看配置</button>
            </div>
            <div class="welcome-grid">
              <div class="welcome-tile">
                <span>Run 编排</span>
                <strong>统一追踪</strong>
              </div>
              <div class="welcome-tile">
                <span>本地优先</span>
                <strong>模型路由</strong>
              </div>
              <div class="welcome-tile">
                <span>测试验收</span>
                <strong>用例工作台</strong>
              </div>
              <div class="welcome-tile">
                <span>上下文</span>
                <strong>历史会话</strong>
              </div>
            </div>
          </div>
        </section>

        <footer class="composer">
          <div class="composer-row meta-row">
            <label class="field">
              <span>权限策略</span>
              <select id="permission-policy-select" title="控制写文件与执行命令的默认边界">
                <option value="readOnly">只读</option>
                <option value="confirmBeforeEdit" selected>修改前确认</option>
                <option value="autoEdit">自动修改</option>
                <option value="confirmBeforeRun">命令前确认</option>
                <option value="autoRun">自动执行</option>
              </select>
            </label>
            <label class="field">
              <span>模型</span>
              <select id="model-select">
                <option value="__default__">自动（默认）</option>
              </select>
            </label>
            <input id="system-input" class="system-input" placeholder="系统提示（可选）" />
            <label class="field sensitive-field" title="勾选后仅使用本地模型">
              <input type="checkbox" id="sensitive-input" />
              <span>敏感（仅本地）</span>
            </label>
            <details class="advanced-entry field">
              <summary>高级选项</summary>
              <div class="advanced-panel">
                <label class="field advanced-mode-field">
                  <span>显式模式</span>
                  <select id="explicit-mode-select" title="覆盖自动意图推断；留空则完全自动">
                    <option value="">自动推断（推荐）</option>
                    <option value="chat">强制对话</option>
                    <option value="plan">强制计划</option>
                    <option value="implement">强制实现</option>
                    <option value="debug">强制调试</option>
                    <option value="review">强制审阅</option>
                  </select>
                </label>
                <label class="field advanced-mode-field advanced-toggle-field" title="通过 SSE 实时展示模型轮次与工具步骤">
                  <input type="checkbox" id="stream-agent-input" checked />
                  <span>SSE 流式（思考过程）</span>
                </label>
                <label class="field advanced-mode-field advanced-toggle-field" title="需模型客户端支持 streaming">
                  <input type="checkbox" id="stream-tokens-input" />
                  <span>流式 token</span>
                </label>
              </div>
            </details>
          </div>
          <div class="composer-row input-row">
            <textarea id="message-input" rows="1" placeholder="描述你想做什么，系统会自动识别意图并选择工作流；回车发送，Shift+回车换行"></textarea>
            <button id="send-btn" class="send-btn" title="发送">发送</button>
          </div>
        </footer>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
