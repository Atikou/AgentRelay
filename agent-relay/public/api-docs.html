<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentRelay API 参考</title>
    <link rel="stylesheet" href="/vendor/scalar-api-reference.css" />
    <link rel="stylesheet" href="/api-docs.css" />
  </head>
  <body>
    <header class="api-topbar">
      <div class="api-topbar-left">
        <span class="logo-dot"></span>
        <span class="logo-text">AgentRelay API 参考</span>
        <span class="badge">REST JSON</span>
      </div>
      <div class="api-topbar-right">
        <a class="topbar-link" href="/api-spec.json" target="_blank" rel="noopener">api-spec.json</a>
        <a class="topbar-link" href="/docs">说明文档</a>
        <a class="topbar-link" href="/">测试台</a>
      </div>
    </header>
    <!-- Scalar 官方 HTML 集成：id 必须在 script 上，并设置 data-url（勿用 div#api-reference） -->
    <script
      id="api-reference"
      data-url="/api-spec.json"
      data-configuration='{"metaData":{"title":"AgentRelay API 参考"},"searchHotKey":"k","theme":"default","layout":"modern"}'
    ></script>
    <script src="/vendor/scalar-api-reference.js"></script>
  </body>
</html>
